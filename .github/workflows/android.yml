name: "Release Android"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase
          npm install

      - name: build ui for android
        run: npm run build:ui:android

      - name: create android app
        run: |
          cd packages/android
          briefcase create android --no-input

      - name: build android app
        run: |
          cd packages/android
          briefcase build android --no-input

      - name: package android app
        run: |
          cd packages/android
          briefcase package android --no-input

      - name: sign and release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            packages/android/dist/*.apk
            packages/android/dist/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
