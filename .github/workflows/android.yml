name: Release Android App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: download sidecars
        run: node scripts/download-binaries.js

      - name: install dependencies
        run: npm ci

      - name: initialize android
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            yes | npx tauri android init
          fi

      - name: build android app (.apk)
        # --target restricts ABIs to arm64-v8a and x86_64 only (armv7/x86 have no static FFmpeg)
        run: npx tauri android build --target aarch64 --target x86_64

      - name: sign APK (aarch64)
        run: |
          # Generate a self-signed keystore for distribution signing
          keytool -genkeypair \
            -alias omnigrab \
            -keypass omnigrab123 \
            -keystore omnigrab.jks \
            -storepass omnigrab123 \
            -dname "CN=OmniGrab, OU=App, O=OmniGrab, L=Unknown, S=Unknown, C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

          # Sign and align the aarch64 APK
          UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*arm64*unsigned*.apk" -o -name "*aarch64*unsigned*.apk" 2>/dev/null | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*unsigned*.apk" | head -1)
          fi

          echo "Found unsigned APK: $UNSIGNED_APK"
          ls -R src-tauri/gen/android/app/build/outputs/apk/ || true

          if [ -n "$UNSIGNED_APK" ]; then
            $ANDROID_HOME/build-tools/*/apksigner sign \
              --ks omnigrab.jks \
              --ks-pass pass:omnigrab123 \
              --key-pass pass:omnigrab123 \
              --ks-key-alias omnigrab \
              --out OmniGrab-aarch64.apk \
              "$UNSIGNED_APK"
            echo "✓ Signed APK: OmniGrab-aarch64.apk"
          else
            echo "⚠ No unsigned APK found — listing all APK outputs:"
            find src-tauri/gen/android/app/build/outputs -name "*.apk" || true
          fi

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OmniGrab-aarch64.apk
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
