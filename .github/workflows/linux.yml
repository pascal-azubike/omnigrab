name: Linux Build
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'packages/ui/**'
      - 'packages/desktop/**'
      - '.github/workflows/linux.yml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target
        
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev \
            lld \
            clang
          
      - name: install project dependencies
        run: |
          rm -f package-lock.json
          npm install
        
      - name: build UI
        run: npm run build
        working-directory: packages/ui

      - name: Download yt-dlp + ffmpeg binaries
        run: node scripts/download-binaries.js
        working-directory: packages/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Desktop Application (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        run: npm run build
        working-directory: packages/desktop

      - name: Upload Linux Build Artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: omnigrab-linux-x64
          path: |
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
          if-no-files-found: warn

      - name: Build and Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniGrab ${{ github.ref_name }}'
          releaseBody: 'Linux version build.'
          releaseDraft: true
          prerelease: false
