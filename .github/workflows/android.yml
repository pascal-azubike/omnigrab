name: Android Build
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'packages/ui/**'
      - 'packages/android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install project dependencies
        run: |
          rm -f package-lock.json
          npm install --include=optional

      - name: build UI
        run: npm --prefix packages/ui run build:android

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create Android App
        run: |
          cd packages/android
          briefcase create android
          briefcase build android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnigrab-android-apk
          path: packages/android/build/omnigrab/android/gradle/app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/android/build/omnigrab/android/gradle/app/build/outputs/apk/debug/*.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
