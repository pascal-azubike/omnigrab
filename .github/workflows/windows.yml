name: Windows Build
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'packages/ui/**'
      - 'packages/desktop/**'
      - '.github/workflows/windows.yml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        
      - name: install project dependencies
        run: |
          Remove-Item -Path "package-lock.json" -ErrorAction SilentlyContinue
          npm install
        
      - name: build UI
        run: npm run build
        working-directory: packages/ui

      - name: Download yt-dlp + ffmpeg binaries
        run: node scripts/download-binaries.js
        working-directory: packages/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify sidecar placement
        run: dir packages/desktop/src-tauri
        
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniGrab ${{ github.ref_name }}'
          releaseBody: 'Windows version build.'
          releaseDraft: true
          prerelease: false
