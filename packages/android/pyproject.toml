[tool.briefcase]
project_name = "OmniGrab"
bundle = "com.omnigrab"
version = "2.0.0"
display_name = "OmniGrab"
author = "Pascal Azubike"
author_email = "pascal@example.com"
description = "Universal Video Downloader"

[tool.briefcase.app.omnigrab_android]
formal_name = "OmniGrab"
description = "Universal Video Downloader"
sources = ["src/omnigrab_android"]
requires = [
    "toga-android>=0.4.0",
    "fastapi",
    "uvicorn",
    "yt-dlp",
    "yt-dlp-exec",
    "asyncio",
    "python-multipart"
]

[tool.briefcase.app.omnigrab_android.android]
permissions = [
    "INTERNET",
    "WRITE_EXTERNAL_STORAGE",
    "READ_EXTERNAL_STORAGE",
    "MANAGE_EXTERNAL_STORAGE"
]
features = ["webview"]
min_sdk_version = 26
target_sdk_version = 34

[tool.briefcase.app.omnigrab_android.android.gradle]
dependencies = [
    "com.github.yausername.youtubedl-android:library:0.16.0",
    "com.github.yausername.youtubedl-android:ffmpeg:0.16.0"
]
