name: Release Android App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: download sidecars
        run: node scripts/download-binaries.js

      - name: install dependencies
        run: npm ci

      - name: initialize android
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            yes | npx tauri android init
          fi

      - name: build android app (.apk)
        # --target restricts ABIs to arm64-v8a and x86_64 only (armv7/x86 have no static FFmpeg)
        run: npx tauri android build --target aarch64 --target x86_64

      - name: sign APK (universal)
        run: |
          # Generate a self-signed keystore for distribution signing
          keytool -genkeypair \
            -alias omnigrab \
            -keypass omnigrab123 \
            -keystore omnigrab.jks \
            -storepass omnigrab123 \
            -dname "CN=OmniGrab, OU=App, O=OmniGrab, L=Unknown, ST=Unknown, C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

          # Find the latest apksigner
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          echo "Using apksigner at: $APKSIGNER"

          # Find the unsigned APK
          UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*unsigned.apk" | head -1)
          echo "Found unsigned APK: $UNSIGNED_APK"

          if [ -n "$UNSIGNED_APK" ] && [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" sign \
              --ks omnigrab.jks \
              --ks-pass pass:omnigrab123 \
              --key-pass pass:omnigrab123 \
              --ks-key-alias omnigrab \
              --out OmniGrab-universal.apk \
              "$UNSIGNED_APK"
            echo "✓ Signed APK: OmniGrab-universal.apk"
          else
            echo "❌ Failed to find APK or apksigner"
            exit 1
          fi

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OmniGrab-universal.apk
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
