name: Release Android App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: download sidecars
        run: node scripts/download-binaries.js

      - name: debug sidecars
        run: ls -R src-tauri/

      - name: install dependencies
        run: npm ci

      - name: initialize android if missing
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            yes | npx tauri android init
          fi

      - name: restrict android ABI to arm64 and x86_64
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            # Inject abiFilters so Gradle only compiles arm64-v8a and x86_64
            # This prevents Tauri from looking for missing armv7/x86 sidecar binaries
            sed -i '/defaultConfig {/a\        ndk { abiFilters += listOf("arm64-v8a", "x86_64") }' "$GRADLE_FILE"
            echo "✓ abiFilters applied:"
            grep -A2 "abiFilters" "$GRADLE_FILE"
          else
            echo "⚠ build.gradle.kts not found at expected path"
            find src-tauri/gen -name "*.gradle.kts" 2>/dev/null || true
          fi

      - name: build android app (.apk)
        run: npx tauri android build

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
