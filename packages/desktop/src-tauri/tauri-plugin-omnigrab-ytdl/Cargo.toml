[package]
name = "tauri-plugin-omnigrab-ytdl"
version = "0.1.0"
authors = [ "OmniGrab" ]
description = ""
edition = "2021"
rust-version = "1.77.2"
exclude = ["/examples", "/dist-js", "/guest-js", "/node_modules"]
