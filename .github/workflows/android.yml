name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install UI dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build SvelteKit UI for Android
        run: |
          npm run build:ui:android
          echo "UI files:"
          ls packages/android/app/src/main/python/ui/

      - name: Setup Python 3.12 (for Chaquopy build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: |
          cd packages/android
          gradle assembleDebug --no-daemon

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode \
            > packages/android/omnigrab-release.jks

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd packages/android
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/omnigrab-release.jks" \
            -Pandroid.injected.signing.store.password=\
            "${ANDROID_KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias=\
            "${ANDROID_KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password=\
            "${ANDROID_KEY_PASSWORD}" \
            --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          cp packages/android/app/build/outputs/apk/release/app-release.apk "OmniGrab-${VERSION}-android.apk"
          echo "APK_PATH=OmniGrab-${VERSION}-android.apk" >> $GITHUB_ENV

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          tag_name: ${{ github.ref_name }}
          name: "OmniGrab ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnigrab-debug-apk
          path: packages/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
