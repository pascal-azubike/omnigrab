name: Build Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            artifact_glob: 'packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage'

          - os: macos-latest
            label: macos
            artifact_glob: 'packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg'

          - os: windows-latest
            label: windows
            artifact_glob: 'packages/desktop/src-tauri/target/release/bundle/nsis/*.exe'

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install UI dependencies
        run: npm ci
        working-directory: packages/ui

      - name: Build SvelteKit UI
        run: npm run build:desktop
        working-directory: packages/ui

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: OmniGrab ${{ github.ref_name }}
          releaseBody: |
            ## OmniGrab ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | 🪟 Windows | `OmniGrab-*-setup.exe` |
            | 🍎 macOS | `OmniGrab-*.dmg` |
            | 🐧 Linux | `OmniGrab-*.AppImage` |
            | 🤖 Android | `OmniGrab-*-android.apk` |

            See [CHANGELOG](https://github.com/pascal-azubike/omnigrab/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
