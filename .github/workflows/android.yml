name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/ui/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Briefcase and dependencies
        run: |
          pip install briefcase toga yt-dlp fastapi uvicorn aiofiles python-multipart

      - name: Install UI Node dependencies
        run: |
          cd packages/ui
          npm ci

      - name: Build SvelteKit UI for Android
        run: |
          cd packages/ui
          npm run build:android

      - name: Create Briefcase Android scaffold
        run: |
          cd packages/android
          briefcase create android --no-input

      - name: Build debug APK
        run: |
          cd packages/android
          briefcase build android

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode \
            > packages/android/omnigrab-release.jks

      - name: Upload debug APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/android/build/omnigrab-android/android/gradle/app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ github.ref_name }}
          name: "OmniGrab ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnigrab-debug-apk
          path: packages/android/build/omnigrab-android/android/gradle/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
