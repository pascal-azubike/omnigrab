[tool.briefcase]
project_name = "OmniGrab"
bundle = "com.omnigrab"
version = "1.0.0"
url = "https://github.com/pascal-azubike/omnigrab"
license.file = "LICENSE"
author = "Pascal Azubike"
author_email = "pascal@example.com"

[tool.briefcase.app.omnigrab-android]
formal_name = "OmniGrab"
description = "Download any video from any platform"
long_description = """OmniGrab lets you download videos, audio,
and playlists from 1800+ platforms including YouTube, TikTok,
Instagram, Twitter, Vimeo, Twitch and more."""
icon = "src/omnigrab_android/resources/omnigrab"
sources = ["src/omnigrab_android"]
test_sources = ["tests"]
requires = [
    "toga-core==0.4.7",
    "toga-android==0.4.7",
    "travertino>=0.3.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "yt-dlp>=2024.12.13",
    "aiofiles>=23.0.0",
    "httpx>=0.27.0",
    "python-multipart>=0.0.9",
    "anyio>=4.0.0",
]

[tool.briefcase.app.omnigrab-android.android]
build_gradle_dependencies = [
    "androidx.appcompat:appcompat:1.6.1",
    "androidx.webkit:webkit:1.15.0",
]

permissions = { "android.permission.INTERNET" = true, "android.permission.READ_EXTERNAL_STORAGE" = true, "android.permission.WRITE_EXTERNAL_STORAGE" = true, "android.permission.READ_MEDIA_VIDEO" = true, "android.permission.READ_MEDIA_AUDIO" = true, "android.permission.READ_MEDIA_IMAGES" = true, "android.permission.FOREGROUND_SERVICE" = true, "android.permission.POST_NOTIFICATIONS" = true }

supported_abis = ["arm64-v8a", "x86_64"]

min_sdk_version = 26
target_sdk_version = 34

[tool.briefcase.app.omnigrab-android.android.signing]
# Signing config is injected via GitHub Actions secrets
# Do not hardcode keystore credentials here
